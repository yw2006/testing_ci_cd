name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────────
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

  # ─────────────────────────────────────────────
  # 2. UNIT TESTS
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Testing
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/

  # ─────────────────────────────────────────────
  # 3. INTEGRATION TESTS
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Testing
    runs-on: ubuntu-latest
    needs: unit-tests
    # No DB services needed — the app uses an in-memory store
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        env:
          NODE_ENV: test
        run: npm run test:integration

  # ─────────────────────────────────────────────
  # 4. E2E TESTS
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Testing
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start app in background
        run: npm start &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000/health --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  # ─────────────────────────────────────────────
  # 5. DEPLOY TO RAILWAY (source deploy — no Docker needed)
  # Railway auto-detects Node.js, runs `npm ci` then `npm start`.
  # Only fires on push to main/master, not on PRs.
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy source to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service my-node-app --detach